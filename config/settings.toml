[exchange]
name = "bitget"
product_type = "USDT-FUTURES"
margin_coin = "USDT"
margin_mode = "crossed"
# paper: 使用 Bitget 实盘公开行情，在本地撮合，不向交易所发单
# live: 实盘交易（当前版本禁止）
execution_mode = "paper"
live_trading_enabled = false

[paper]
initial_equity = 1000.0
taker_fee_rate = 0.0006
slippage_rate = 0.0005
funding_rate_fallback = 0.0001

[universe]
minimum_listing_days = 30
minimum_quote_volume_24h = 10000000.0
maximum_spread_ratio = 0.003
scan_interval_seconds = 300
scan_after_close_delay_seconds = 3
maximum_scan_candidates = 20
excluded_base_assets = ["USDC", "USDE", "DAI", "FDUSD", "TUSD", "EUR", "BGB"]

[strategy]
signal_timeframe = "5m"
trend_timeframe = "1H"
breakout_lookback = 20
volume_lookback = 20
volume_multiplier = 1.8
ema_fast_period = 20
ema_slow_period = 50
atr_period = 14
stop_atr_multiple = 2.0
minimum_reward_risk = 2.0
breakeven_at_r = 1.0
first_take_profit_at_r = 1.5
first_take_profit_fraction = 0.5
trailing_atr_multiple = 2.5

[risk]
risk_per_trade = 0.05
maximum_symbol_risk = 0.05
daily_loss_limit = 0.25
maximum_drawdown = 0.50
test_maximum_positions = 3
production_maximum_positions = 5
test_equity_threshold = 200.0
minimum_leverage = 2
maximum_leverage = 125
use_exchange_max_leverage = true
maximum_consecutive_losses = 4
cooldown_hours_after_loss_streak = 12

[notifications]
channel = "email"
smtp_host = "smtp.qq.com"
smtp_port = 465
